name: ci
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Module-resolution collision guard
        run: python3 VegaNotes/scripts/check_module_collisions.py

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install
        run: pip install -e backend[dev]
      - name: Lint
        run: |
          cd backend
          ruff check .
      - name: Test
        run: |
          cd backend
          VEGANOTES_DATA_DIR=/tmp/vega-test pytest -q

  parser-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: cd packages/parser-ts && node --test --experimental-strip-types tests/parser.test.ts

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @veganotes/frontend lint
      - run: pnpm --filter @veganotes/frontend build
