apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: veganotes
resources:
  - ../../base
patches:
  - target: { kind: Deployment, name: veganotes }
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
images:
  - name: veganotes
    newTag: "0.1.0"
